trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  azureSubscription: 'conexion-azure'
  appName: 'demoapi-fernar'
  resourceGroup: 'rg-demo-cicd'

stages:

# ══════════════════════════════════════════════════
# STAGE 1 — COMPILAR Y EJECUTAR PRUEBAS UNITARIAS
# ══════════════════════════════════════════════════
- stage: Build
  displayName: 'Compilar y probar'
  jobs:
  - job: BuildJob
    steps:

    - task: DotNetCoreCLI@2
      displayName: 'Restaurar paquetes NuGet'
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Compilar solucion'
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration $(buildConfiguration)'

    - task: DotNetCoreCLI@2
      displayName: 'Ejecutar pruebas unitarias'
      inputs:
        command: 'test'
        projects: '**/*.Tests.csproj'
        arguments: '--configuration $(buildConfiguration) --logger trx'

    - task: DotNetCoreCLI@2
      displayName: 'Publicar artefacto'
      inputs:
        command: 'publish'
        publishWebProjects: true
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true

    - task: PublishBuildArtifacts@1
      displayName: 'Guardar artefacto en pipeline'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'webapp'

# ══════════════════════════════════════════════════
# STAGE 2 — DESPLEGAR EN STAGING
# ══════════════════════════════════════════════════
- stage: DeployStaging
  displayName: 'Desplegar en Staging'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployStaging
    environment: 'staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Deploy al slot staging'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webApp'
              appName: '$(appName)'
              deployToSlotOrASE: true
              resourceGroupName: '$(resourceGroup)'
              slotName: 'staging'
              package: '$(Pipeline.Workspace)/webapp/**/*.zip'

# ══════════════════════════════════════════════════
# STAGE 3 — SWAP STAGING → PRODUCCION
# ══════════════════════════════════════════════════
- stage: SwapToProduction
  displayName: 'Swap a Produccion (Zero Downtime)'
  dependsOn: DeployStaging
  condition: succeeded()
  jobs:
  - deployment: SwapSlots
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureAppServiceManage@0
            displayName: 'Intercambiar staging con produccion'
            inputs:
              azureSubscription: '$(azureSubscription)'
              Action: 'Swap Slots'
              WebAppName: '$(appName)'
              ResourceGroupName: '$(resourceGroup)'
              SourceSlot: 'staging'